<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="./css/main.css" />
        <title>Frontend Mentor | Blog preview card</title>
    </head>
    <body>
        <main class="main">
            <section class="card">
                <img
                    class="card-main-img"
                    src="./assets/images/illustration-article.svg"
                    alt="Card illustration, an abstract collection of shapes and colours"
                />
                <h2 class="card-category">Learning</h2>
                <p class="card-pub-date">Published 21 Dec 2023</p>
                <h1 class="card-title">
                    <a href="#" tabindex="0">HTML & CSS foundations</a>
                </h1>
                <p class="card-description">
                    These languages are the backbone of every website, defining
                    structure, content, and presentation.
                </p>
                <footer class="footer-card">
                    <img
                        class="card-author-img"
                        src="./assets/images/image-avatar.webp"
                        alt="Author's avatar"
                    />
                    <p class="card-author">Greg Hooper</p>
                </footer>
            </section>
        </main>

        <footer class="footer-main attribution">
            <p>
                Challenge by
                <a
                    href="https://www.frontendmentor.io?ref=challenge"
                    target="_blank"
                    >Frontend Mentor</a
                >. Coded by <a href="#">Mark Tripney</a>.
            </p>
        </footer>
    </body>
</html>
